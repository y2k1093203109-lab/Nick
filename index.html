<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎來到 Nick 的測試網頁</title>
    <!-- Google Fonts: Outfit & Noto Sans TC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #080710;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary-gradient: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --glow-color-1: rgba(168, 85, 247, 0.4);
            --glow-color-2: rgba(59, 130, 246, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glowing Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--glow-color-1);
            top: -100px;
            left: -100px;
            animation: floatOrb1 20s infinite alternate ease-in-out;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--glow-color-2);
            bottom: -150px;
            right: -100px;
            animation: floatOrb2 25s infinite alternate ease-in-out;
        }

        @keyframes floatOrb1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 80px) scale(1.2); }
        }

        @keyframes floatOrb2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-120px, -60px) scale(1.1); }
        }

        /* Subtle Grid Pattern Overlay */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 2;
            pointer-events: none;
        }

        /* Main Container with Glassmorphism */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 550px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glow border animation effect on hover */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 28px;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.5), rgba(59, 130, 246, 0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.5;
            transition: opacity 0.5s ease;
        }

        .container:hover::before {
            opacity: 1;
        }

        /* Avatar or Icon Area */
        .avatar-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3);
            position: relative;
        }

        .avatar-container::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .avatar-icon {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
        }

        /* Typography */
        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, #a855f7 60%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* Futuristic Button */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.9rem 2.2rem;
            border-radius: 14px;
            background: var(--primary-gradient);
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Subtle Status Tag */
        .badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #a855f7;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        /* Interactive Particle effect on click */
        .click-effect {
            position: absolute;
            border: 2px solid var(--text-primary);
            border-radius: 50%;
            pointer-events: none;
            animation: ripple 0.6s linear;
            transform: translate(-50%, -50%);
            z-index: 99;
        }

        @keyframes ripple {
            0% {
                width: 0px;
                height: 0px;
                opacity: 0.5;
            }
            100% {
                width: 100px;
                height: 100px;
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-overlay"></div>

    <div class="container" id="mainCard">
        <div class="badge">Production Ready</div>
        
        <div class="avatar-container">
            <div class="avatar-icon">N</div>
        </div>

        <h1>歡迎來到 Nick 的測試網頁</h1>
        
        <p>
            這是一個以極簡美學與現代科技感打造的動態測試頁面。<br>
            結合了毛玻璃效果、環境發光粒子與流暢微交互，展現極致視覺體驗。
        </p>

        <a href="https://github.com/y2k1093203109-lab/Nick" class="btn" target="_blank">
            瀏覽 GitHub 儲存庫
        </a>
    </div>

    <script>
        // Parallax hover effect on the glassmorphism container
        const card = document.getElementById('mainCard');
        const container = document.body;

        container.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.clientX) / 45;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 45;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        container.addEventListener('mouseenter', () => {
            card.style.transition = 'none';
        });

        container.addEventListener('mouseleave', () => {
            card.style.transition = 'transform 0.5s ease';
            card.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });

        // Interactive ripple effect on click
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.classList.add('click-effect');
            
            // Random color for ripple border
            const colors = ['#a855f7', '#3b82f6', '#00f2fe', '#ff007a'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            ripple.style.borderColor = randomColor;
            ripple.style.boxShadow = `0 0 10px ${randomColor}`;

            ripple.style.left = `${e.clientX}px`;
            ripple.style.top = `${e.clientY}px`;
            
            document.body.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 600);
        });
    </script>
</body>
</html>
